<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>5 UPM Official Student Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        120deg,
        red, orange, yellow, lime, cyan, blue, magenta
      );
      background-size: 400% 400%;
      animation: neon 8s infinite alternate;
    }

    @keyframes neon {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .card {
      background: rgba(0, 0, 0, 0.75);
      padding: 25px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,255,255,0.6);
      color: white;
    }

    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #25D366;
      padding: 12px;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px #25D366;
    }

    .tab img {
      width: 28px;
      height: 28px;
    }

    .join-btn {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #25D366;
      color: black;
      cursor: pointer;
      box-shadow: 0 0 15px #25D366;
      transition: transform 0.2s;
    }

    .join-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>5 UPM Official Student Group</h2>

    <div class="tab">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
      <span>Join official 5 UPM group on WhatsApp</span>
    </div>

    <a href="https://chat.whatsapp.com/Jd2wY0GWqcw7z7XQ0SCtg9" target="_blank">
      <button class="join-btn">Join</button>
    </a>
  </div>

</body>
</html>
